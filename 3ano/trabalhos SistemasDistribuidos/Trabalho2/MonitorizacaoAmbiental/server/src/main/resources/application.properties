spring.application.name=MonitorizacaoServer
server.port=8080

# Configura\u00e7\u00e3o gRPC
grpc.server.port=9090
grpc.server.address=*

# Base de Dados PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5433/monitorizacao_db
spring.datasource.username=sd_user
spring.datasource.password=sd_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA (Cria as tabelas automaticamente)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect